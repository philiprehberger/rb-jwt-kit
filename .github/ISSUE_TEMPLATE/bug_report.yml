name: Bug Report
description: Report a bug in philiprehberger-jwt_kit
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code to reproduce the issue.
      placeholder: |
        require "philiprehberger/jwt_kit"

        Philiprehberger::JwtKit.configure do |c|
          c.secret = "my-secret"
        end

        # Steps that trigger the bug...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: input
    id: ruby-version
    attributes:
      label: Ruby Version
      placeholder: "3.3.0"
    validations:
      required: true
  - type: input
    id: gem-version
    attributes:
      label: Gem Version
      placeholder: "0.3.0"
    validations:
      required: true
